name: smoke

on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m py_compile bin/solana-validator-rpc-health.py
      - run: python bin/solana-validator-rpc-health.py --help
